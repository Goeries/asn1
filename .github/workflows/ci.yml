name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          find include tests fuzz \( -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format-18 --dry-run --Werror

  gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-14 ninja-build
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-14
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang-19 libclang-rt-19-dev ninja-build
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=clang++-19 -DASN1_BUILD_FUZZERS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-20 g++-14 ninja-build
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: clang-tidy
        run: run-clang-tidy-20 -p build -quiet "$GITHUB_WORKSPACE/(include|tests)/.*"

  msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: git
          pacboy: gcc:p cmake:p ninja:p
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
